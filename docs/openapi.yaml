# ══════════════════════════════════════
# Components
# ══════════════════════════════════════
components:
  securitySchemes:
    session:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: Auth.js (NextAuth) の JWT セッション Cookie

  # ──────────────────────────────────────
  # Parameters
  # ──────────────────────────────────────
  parameters:
    ProjectIdParam:
      name: id
      in: path
      required: true
      description: プロジェクト ID (cuid)
      schema:
        type: string

    TaskIdParam:
      name: taskId
      in: path
      required: true
      description: タスク ID (cuid)
      schema:
        type: string

    MemberIdParam:
      name: memberId
      in: path
      required: true
      description: プロジェクトメンバー ID (cuid)
      schema:
        type: string

    CommentIdParam:
      name: commentId
      in: path
      required: true
      description: コメント ID (cuid)
      schema:
        type: string

    CategoryIdParam:
      name: categoryId
      in: path
      required: true
      description: カテゴリ ID (cuid)
      schema:
        type: string

    AttachmentIdParam:
      name: attachmentId
      in: path
      required: true
      description: 添付ファイル ID (cuid)
      schema:
        type: string

    NotificationIdParam:
      name: notificationId
      in: path
      required: true
      description: 通知 ID (cuid)
      schema:
        type: string

    PageParam:
      name: page
      in: query
      description: ページ番号（1始まり）
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: perPage
      in: query
      description: 1ページあたりの件数
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  # ──────────────────────────────────────
  # Schemas
  # ──────────────────────────────────────
  schemas:
    # ── Enums ──
    Role:
      type: string
      enum: [ADMIN, MEMBER]
      description: システム権限

    ProjectRole:
      type: string
      enum: [OWNER, ADMIN, MEMBER, VIEWER]
      description: プロジェクト内権限

    TaskStatus:
      type: string
      enum: [BACKLOG, TODO, IN_PROGRESS, IN_REVIEW, DONE]
      description: タスクステータス

    Priority:
      type: string
      enum: [URGENT, HIGH, MEDIUM, LOW, NONE]
      description: 優先度

    Theme:
      type: string
      enum: [LIGHT, DARK, SYSTEM]
      description: テーマ設定

    NotificationType:
      type: string
      enum:
        - TASK_ASSIGNED
        - TASK_COMMENTED
        - TASK_STATUS_CHANGED
        - TASK_DUE_SOON
        - MENTIONED
      description: 通知種別

    ActivityAction:
      type: string
      enum:
        - CREATED
        - UPDATED
        - DELETED
        - STATUS_CHANGED
        - ASSIGNED
        - COMMENTED
        - ATTACHED
      description: アクティビティ操作種別

    # ── Entity Schemas ──
    User:
      type: object
      required: [id, email, name, role, locale, theme, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: cuid
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/Role"
        locale:
          type: string
          example: ja
        theme:
          $ref: "#/components/schemas/Theme"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserSummary:
      type: object
      description: パスワードを除いたユーザー概要
      required: [id, email, name, role]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"

    UserRef:
      type: object
      description: ユーザー参照（タスク担当者・起票者等で使用）
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true

    Project:
      type: object
      required: [id, name, key, ownerId, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
          example: Devin Task Board
        description:
          type: string
          nullable: true
        key:
          type: string
          example: DTB
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectMember:
      type: object
      required: [id, projectId, userId, role, createdAt, updatedAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        userId:
          type: string
        role:
          $ref: "#/components/schemas/ProjectRole"
        user:
          $ref: "#/components/schemas/UserRef"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      type: object
      required:
        - id
        - taskNumber
        - title
        - status
        - priority
        - projectId
        - reporterId
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        taskNumber:
          type: integer
          description: プロジェクト内連番
          example: 1
        title:
          type: string
          example: ログイン画面の実装
        description:
          type: string
          nullable: true
          description: Markdown 対応
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/Priority"
        projectId:
          type: string
        assigneeId:
          type: string
          nullable: true
        reporterId:
          type: string
        parentTaskId:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        estimatedHours:
          type: number
          nullable: true
        actualHours:
          type: number
          nullable: true
        sortOrder:
          type: integer
        assignee:
          $ref: "#/components/schemas/UserRef"
        reporter:
          $ref: "#/components/schemas/UserRef"
        taskCategories:
          type: array
          items:
            type: object
            required: [id, taskId, categoryId]
            properties:
              id:
                type: string
              taskId:
                type: string
              categoryId:
                type: string
              category:
                $ref: "#/components/schemas/Category"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Category:
      type: object
      required: [id, name, color, projectId, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
          example: バグ
        color:
          type: string
          description: OKLCH カラー値
          example: "oklch(0.7 0.15 30)"
        projectId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      required: [id, content, taskId, authorId, createdAt, updatedAt]
      properties:
        id:
          type: string
        content:
          type: string
          description: Markdown 対応
        taskId:
          type: string
        authorId:
          type: string
        author:
          $ref: "#/components/schemas/UserRef"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Attachment:
      type: object
      required:
        - id
        - fileName
        - fileUrl
        - fileSize
        - mimeType
        - taskId
        - uploaderId
        - createdAt
      properties:
        id:
          type: string
        fileName:
          type: string
          example: screenshot.png
        fileUrl:
          type: string
          example: /uploads/abc123.png
        fileSize:
          type: integer
          description: バイト数
          example: 204800
        mimeType:
          type: string
          example: image/png
        taskId:
          type: string
        uploaderId:
          type: string
        uploader:
          $ref: "#/components/schemas/UserRef"
        createdAt:
          type: string
          format: date-time

    ActivityLog:
      type: object
      required:
        - id
        - action
        - entityType
        - entityId
        - userId
        - projectId
        - createdAt
      properties:
        id:
          type: string
        action:
          $ref: "#/components/schemas/ActivityAction"
        entityType:
          type: string
          description: "対象エンティティ種別（task, comment, project 等）"
          example: task
        entityId:
          type: string
        userId:
          type: string
        projectId:
          type: string
        oldValue:
          description: 変更前の値（JSON）
          nullable: true
        newValue:
          description: 変更後の値（JSON）
          nullable: true
        user:
          $ref: "#/components/schemas/UserRef"
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      required: [id, type, title, message, isRead, userId, createdAt]
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/NotificationType"
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        userId:
          type: string
        linkUrl:
          type: string
          nullable: true
          description: 遷移先 URL
        createdAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      required: [id, action, userId, resource, resourceId, createdAt]
      properties:
        id:
          type: string
        action:
          type: string
          description: 操作内容
        userId:
          type: string
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        resource:
          type: string
          description: 対象リソース
        resourceId:
          type: string
        details:
          description: 詳細情報（JSON）
          nullable: true
        user:
          $ref: "#/components/schemas/UserRef"
        createdAt:
          type: string
          format: date-time

    DashboardData:
      type: object
      required:
        - summary
        - statusChart
        - priorityChart
        - completionTrend
        - myTasks
        - upcomingTasks
        - recentActivities
      properties:
        summary:
          type: object
          required: [totalTasks, completedTasks, inProgressTasks, overdueTasks]
          properties:
            totalTasks:
              type: integer
              example: 42
            completedTasks:
              type: integer
              example: 15
            inProgressTasks:
              type: integer
              example: 10
            overdueTasks:
              type: integer
              example: 3
        statusChart:
          type: array
          description: ステータス別タスク数（棒グラフ用）
          items:
            type: object
            required: [status, count]
            properties:
              status:
                $ref: "#/components/schemas/TaskStatus"
              count:
                type: integer
        priorityChart:
          type: array
          description: 優先度別タスク数（円グラフ用）
          items:
            type: object
            required: [priority, count]
            properties:
              priority:
                $ref: "#/components/schemas/Priority"
              count:
                type: integer
        completionTrend:
          type: array
          description: 直近7日間の完了タスク数推移
          items:
            type: object
            required: [date, count]
            properties:
              date:
                type: string
                format: date
              count:
                type: integer
        myTasks:
          type: array
          description: 自分にアサインされたタスク（上位5件）
          maxItems: 5
          items:
            $ref: "#/components/schemas/Task"
        upcomingTasks:
          type: array
          description: 期限が近いタスク（上位5件）
          maxItems: 5
          items:
            $ref: "#/components/schemas/Task"
        recentActivities:
          type: array
          description: 最近のアクティビティ（上位10件）
          maxItems: 10
          items:
            $ref: "#/components/schemas/ActivityLog"

    Pagination:
      type: object
      required: [page, perPage, total, totalPages]
      properties:
        page:
          type: integer
          example: 1
        perPage:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 5

    # ── Request Schemas ──
    SignupRequest:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
          description: メールアドレス
        name:
          type: string
          minLength: 1
          description: 表示名
        password:
          type: string
          minLength: 8
          description: パスワード（8文字以上）

    ResetPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          description: プロジェクト名（必須）
        description:
          type: string
          description: プロジェクト説明

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
          description: 招待するユーザーのメールアドレス
        role:
          type: string
          enum: [ADMIN, MEMBER, VIEWER]
          description: 付与するプロジェクト権限

    UpdateMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/ProjectRole"

    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          description: タイトル（必須）
        description:
          type: string
          description: 説明（Markdown 対応）
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/Priority"
        assigneeId:
          type: string
          description: 担当者 ID
        dueDate:
          type: string
          format: date-time
          description: 期限

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/Priority"
        assigneeId:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        estimatedHours:
          type: number
          nullable: true
        actualHours:
          type: number
          nullable: true

    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          description: コメント本文（Markdown 対応）

    UpdateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    CreateCategoryRequest:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          minLength: 1
          description: カテゴリ名
        color:
          type: string
          description: OKLCH カラー値

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        avatarUrl:
          type: string
          nullable: true
        locale:
          type: string
          enum: [ja, en]
        theme:
          $ref: "#/components/schemas/Theme"

    # ── Error Schema ──
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: エラーコード
              example: VALIDATION_ERROR
            message:
              type: string
              description: エラーメッセージ
              example: タイトルは必須です

  # ──────────────────────────────────────
  # Responses
  # ──────────────────────────────────────
  responses:
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: タイトルは必須です

    Unauthorized:
      description: 未認証
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNAUTHORIZED
              message: 認証が必要です

    Forbidden:
      description: 権限不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FORBIDDEN
              message: この操作を実行する権限がありません

    NotFound:
      description: リソース未発見
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: NOT_FOUND
              message: リソースが見つかりません

    InternalError:
      description: サーバーエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INTERNAL_ERROR
              message: サーバーエラーが発生しました
