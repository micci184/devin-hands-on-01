openapi: 3.1.0
info:
  title: devin-task-board API
  description: |
    プロジェクト管理アプリケーション devin-task-board の REST API 仕様。
    Next.js 16 App Router の Route Handlers で実装。
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: ローカル開発環境

tags:
  - name: Auth
    description: 認証（サインアップ・パスワードリセット）
  - name: Projects
    description: プロジェクト CRUD
  - name: ProjectMembers
    description: プロジェクトメンバー管理
  - name: Tasks
    description: タスク CRUD・ステータス変更・並び替え
  - name: Subtasks
    description: サブタスク管理
  - name: Comments
    description: コメント CRUD
  - name: Categories
    description: カテゴリ / ラベル管理
  - name: Attachments
    description: ファイル添付
  - name: Search
    description: グローバル検索
  - name: Activities
    description: アクティビティログ
  - name: Notifications
    description: 通知
  - name: Dashboard
    description: ダッシュボード
  - name: AuditLogs
    description: 監査ログ（管理者）
  - name: Users
    description: ユーザープロフィール

paths:
  # ──────────────────────────────────────
  # Auth
  # ──────────────────────────────────────
  /api/auth/signup:
    post:
      operationId: signup
      tags: [Auth]
      summary: サインアップ
      description: メールアドレス・名前・パスワードで新規ユーザーを登録する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/UserSummary"
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/reset-password:
    post:
      operationId: resetPassword
      tags: [Auth]
      summary: パスワードリセット
      description: メールアドレスを指定してパスワードリセットリンクを送信する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: リセットメール送信成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: パスワードリセットメールを送信しました
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  # ──────────────────────────────────────
  # Projects
  # ──────────────────────────────────────
  /api/projects:
    get:
      operationId: listProjects
      tags: [Projects]
      summary: プロジェクト一覧
      description: 認証ユーザーが参加しているプロジェクトの一覧を返す。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createProject
      tags: [Projects]
      summary: プロジェクト作成
      description: |
        新規プロジェクトを作成する。
        作成者は自動的に OWNER になる。
        プロジェクトキーはプロジェクト名から自動生成される。
      security:
        - session: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/projects/{id}:
    get:
      operationId: getProject
      tags: [Projects]
      summary: プロジェクト詳細
      description: 指定したプロジェクトの詳細情報を返す。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: updateProject
      tags: [Projects]
      summary: プロジェクト更新
      description: プロジェクトの名前・説明を更新する。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteProject
      tags: [Projects]
      summary: プロジェクト削除
      description: |
        プロジェクトを削除する。OWNER のみ実行可能。
        関連するタスク・コメント等も CASCADE で削除される。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ──────────────────────────────────────
  # Project Members
  # ──────────────────────────────────────
  /api/projects/{id}/members:
    get:
      operationId: listProjectMembers
      tags: [ProjectMembers]
      summary: メンバー一覧
      description: プロジェクトのメンバー一覧を返す。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: inviteProjectMember
      tags: [ProjectMembers]
      summary: メンバー招待
      description: メールアドレスでメンバーを招待し、権限を設定する。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "201":
          description: 招待成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ProjectMember"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/projects/{id}/members/{memberId}:
    patch:
      operationId: updateProjectMemberRole
      tags: [ProjectMembers]
      summary: 権限変更
      description: メンバーのプロジェクト内権限を変更する。OWNER / ADMIN のみ操作可能。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
        - $ref: "#/components/parameters/MemberIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ProjectMember"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: removeProjectMember
      tags: [ProjectMembers]
      summary: メンバー削除
      description: |
        メンバーをプロジェクトから削除する。
        OWNER は自分自身を削除できない。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
        - $ref: "#/components/parameters/MemberIdParam"
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ──────────────────────────────────────
  # Tasks
  # ──────────────────────────────────────
  /api/projects/{id}/tasks:
    get:
      operationId: listTasks
      tags: [Tasks]
      summary: タスク一覧
      description: |
        プロジェクト内のタスク一覧を返す。
        担当者・カテゴリ情報を含む。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: priority
          in: query
          schema:
            $ref: "#/components/schemas/Priority"
        - name: assigneeId
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
        - name: sort
          in: query
          description: "ソートカラム（例: taskNumber, title, status, priority, dueDate）"
          schema:
            type: string
        - name: order
          in: query
          description: ソート順
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createTask
      tags: [Tasks]
      summary: タスク作成
      description: |
        プロジェクトに新規タスクを作成する。
        タスク番号は自動採番される。起票者は認証ユーザーで自動記録。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/ProjectIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/tasks/{taskId}:
    get:
      operationId: getTask
      tags: [Tasks]
      summary: タスク詳細
      description: タスクの詳細情報を返す。サブタスク・カテゴリ情報を含む。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/TaskIdParam"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: updateTask
      tags: [Tasks]
      summary: タスク更新
      description: |
        タスクのフィールドを更新する。変更時にアクティビティログが記録される。
        VIEWER は編集不可。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/TaskIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteTask
      tags: [Tasks]
      summary: タスク削除
      description: |
        タスクを削除する。関連するコメント・添付ファイル・サブタスクも CASCADE で削除。
        VIEWER は削除不可。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/TaskIdParam"
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/tasks/{taskId}/status:
    patch:
      operationId: updateTaskStatus
      tags: [Tasks]
      summary: ステータス変更（D&D用）
      description: |
        カンバンボードのドラッグ＆ドロップによるステータス変更。
        楽観的更新を前提とし、アクティビティログを記録する。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/TaskIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/TaskStatus"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/tasks/{taskId}/sort:
    patch:
      operationId: updateTaskSort
      tags: [Tasks]
      summary: 並び順変更（D&D用）
      description: カンバンボード内のカード並び順を更新する。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/TaskIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sortOrder]
              properties:
                sortOrder:
                  type: integer
                  description: 新しい並び順
                  example: 3
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ──────────────────────────────────────
  # Subtasks
  # ──────────────────────────────────────
  /api/tasks/{taskId}/subtasks:
    get:
      operationId: listSubtasks
      tags: [Subtasks]
      summary: サブタスク一覧
      description: 親タスクのサブタスク一覧を返す。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/TaskIdParam"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createSubtask
      tags: [Subtasks]
      summary: サブタスク作成
      description: 親タスクにサブタスクを追加する。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/TaskIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ──────────────────────────────────────
  # Comments
  # ──────────────────────────────────────
  /api/tasks/{taskId}/comments:
    get:
      operationId: listComments
      tags: [Comments]
      summary: コメント一覧
      description: タスクのコメント一覧を返す。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/TaskIdParam"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createComment
      tags: [Comments]
      summary: コメント投稿
      description: |
        タスクにコメントを投稿する。Markdown 対応。
        @メンションで通知がトリガーされる。
        投稿時にアクティビティログが記録される。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/TaskIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: 投稿成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/comments/{commentId}:
    patch:
      operationId: updateComment
      tags: [Comments]
      summary: コメント編集
      description: 自分のコメントを編集する。本人のみ操作可能。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/CommentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteComment
      tags: [Comments]
      summary: コメント削除
      description: 自分のコメントを削除する。本人のみ操作可能。
      security:
        - session: []
      parameters:
        - $ref: "#/components/parameters/CommentIdParam"
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ──────────────────────────────────────
  # Categories
  # ──────────────────────────────────────
  /api/projects/{id}/categories:
    get:
      operationId: listCategories
      tags: [Categories]
      summary: カテゴリ一覧
